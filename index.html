<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="description"
			content="Tomáš Belada — software engineer / lead"
		/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<meta name="theme-color" content="#f5f4f1" />

		<title>Tomáš Belada — Software Engineer / Lead</title>
		<style>
			body {
				margin: 0;
				background: #f5f4f1;
				color: #1e2133;
				font-family: "Gill Sans", "Helvetica Neue", sans-serif;
				line-height: 1.4;
			}

			main {
				box-sizing: border-box;
				min-height: 100vh;
				border-left: 14px solid #d5281e;
				display: flex;
				flex-direction: column;
				justify-content: flex-end;
				padding: 48px min(8vw, 96px) 16px min(6vw, 64px);
			}

			h1 {
				margin: 0;
				font-family: Baskerville, Georgia, serif;
				font-size: clamp(52px, 10vw, 96px);
				font-weight: 700;
				letter-spacing: -1.5px;
				line-height: 1;
			}

			.mark {
				color: #d5281e;
				opacity: 0;
				animation: appear 0.6s ease 1.4s forwards;
			}

			@keyframes appear {
				to {
					opacity: 1;
				}
			}

			@media (prefers-reduced-motion: reduce) {
				.mark {
					opacity: 1;
					animation: none;
				}
			}

			.role {
				font-size: 13px;
				letter-spacing: 5px;
				text-transform: uppercase;
				color: #55596e;
				margin: 16px 0 40px;
			}

			.role .slash {
				color: #d5281e;
			}

			ul {
				list-style: none;
				padding: 0;
				margin: 0;
			}

			li {
				display: inline-block;
				font-size: 15px;
				letter-spacing: 0.5px;
			}

			li:not(:first-child)::before {
				content: "/" / "";
				margin: 0 11px;
				color: #d5281e;
			}

			a {
				color: #1e2133;
				text-decoration: none;
				border-bottom: 1px solid #d5281e8c;
				padding-bottom: 1px;
				transition: 0.15s;
			}

			a:hover {
				color: #d5281e;
				border-bottom-color: #d5281e;
			}

			a:focus-visible {
				outline: 2px solid #d5281e;
				outline-offset: 3px;
			}

			nav {
				margin-bottom: 12vh;
			}

			footer {
				font-size: 11px;
				color: #8a8d9c;
			}

			@media (max-width: 600px) {
				main {
					border-left-width: 10px;
					padding: 32px 24px 16px 20px;
				}

				.role {
					margin-bottom: 28px;
				}

				li {
					display: block;
					margin: 8px 0;
				}

				li:not(:first-child)::before {
					content: none;
				}
			}
		</style>
	</head>

	<body>
		<main>
			<h1>Tomáš Belada<span class="mark" aria-hidden="true">;</span></h1>
			<p class="role">
				Software Engineer <span class="slash" aria-hidden="true">/</span> Lead
			</p>
			<nav aria-label="Profiles">
				<ul>
					<li>
						<a href="https://www.linkedin.com/in/tomasbelada/">LinkedIn</a>
					</li>
					<li>
						<a href="https://github.com/belaczek">GitHub</a>
					</li>
					<li>
						<a href="https://x.com/tomasbelada">X</a>
					</li>
					<li>
						<a href="https://www.facebook.com/tomasbelada">Facebook</a>
					</li>
					<li>
						<a href="https://www.goodreads.com/user/show/67691498-tom-belada"
							>Goodreads</a
						>
					</li>
					<li>
						<a href="mailto:jades.hailing-0o@icloud.com">Email</a>
					</li>
				</ul>
			</nav>
			<footer>This page fits into a single TCP packet.</footer>
		</main>
	</body>
</html>
